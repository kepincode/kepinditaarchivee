<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memori Kita - Firebase</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 450px; text-align: center; }
        .hidden { display: none !important; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #ff4757; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        button:hover { background: #e84118; }
        .error-msg { color: #eb4d4b; font-size: 13px; font-weight: bold; margin-bottom: 10px; height: 15px; }
        
        /* Gallery */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-top: 20px; max-height: 400px; overflow-y: auto; padding: 10px; }
        .img-card { position: relative; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s; cursor: pointer; height: 120px; }
        .img-card:hover { transform: scale(1.05); }
        .img-card img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Preview */
        #preview-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #preview-img { max-width: 90%; max-height: 75%; border-radius: 8px; }
        .controls { margin-bottom: 20px; display: flex; gap: 15px; }
        .btn-icon { background: white; color: #333; padding: 10px 18px; border-radius: 20px; cursor: pointer; text-decoration: none; font-size: 14px; font-weight: bold; }
        .btn-delete { background: #ff4757; color: white; }
    </style>
</head>
<body>

    <!-- HALAMAN 1: LOGIN -->
    <div id="login-page" class="container">
        <div id="error-container" class="error-msg"></div>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Masuk</button>
    </div>

    <!-- HALAMAN 2: UPLOAD -->
    <div id="upload-page" class="container hidden">
        <h2>Upload Foto Baru</h2>
        <div id="upload-error" class="error-msg"></div>
        <input type="file" id="file-input" multiple accept="image/*">
        <p id="status-upload" style="font-size: 12px;"></p>
        <button id="next-btn" onclick="goToGallery()">Halaman Selanjutnya</button>
    </div>

    <!-- HALAMAN 3: GALLERY -->
    <div id="gallery-page" class="container hidden" style="max-width: 700px;">
        <h2>Galeri Bersama</h2>
        <button onclick="backToUpload()" style="background: #2f3542; margin-bottom: 15px;">+ Tambah Foto</button>
        <div id="gallery-grid" class="gallery-grid"></div>
    </div>

    <!-- PREVIEW OVERLAY -->
    <div id="preview-overlay" class="hidden">
        <div class="controls">
            <a id="download-link" class="btn-icon">💾 Save Image</a>
            <div id="delete-btn" class="btn-icon btn-delete">🗑️ Hapus</div>
            <div class="btn-icon" onclick="closePreview()">✖ Tutup</div>
        </div>
        <img id="preview-img" src="">
    </div>

    <!-- FIREBASE SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, query, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // GANTI INI DENGAN CONFIG FIREBASE KAMU
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "project-kamu.firebaseapp.com",
            projectId: "project-kamu",
            storageBucket: "project-kamu.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const db = getFirestore(app);

        // --- LOGIN LOGIC ---
        window.login = function() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const err = document.getElementById('error-container');

            if (user !== "kepin") {
                err.innerText = "kepin!!!!!";
            } else if (pass !== "21062009") {
                err.innerText = "tanggal lahirnya kepin masa ga tau si";
            } else {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('upload-page').classList.remove('hidden');
            }
        }

        // --- UPLOAD LOGIC ---
        window.goToGallery = async function() {
            const files = document.getElementById('file-input').files;
            const err = document.getElementById('upload-error');
            const status = document.getElementById('status-upload');

            if (files.length === 0) {
                renderGallery();
                switchPage('upload-page', 'gallery-page');
                return;
            }

            status.innerText = "Sabar, lagi upload...";
            
            // Cek Duplikat di database Firestore
            const snapshot = await getDocs(collection(db, "photos"));
            const existingNames = snapshot.docs.map(doc => doc.data().name);

            for (let file of files) {
                if (existingNames.includes(file.name)) {
                    err.innerText = "WOI GAMBARNYA PAKE YANG LAIN NGAPA";
                    status.innerText = "";
                    return;
                }

                // Upload ke Storage
                const storageRef = ref(storage, 'memori/' + file.name);
                await uploadBytes(storageRef, file);
                const url = await getDownloadURL(storageRef);

                // Simpan metadata ke Firestore
                await addDoc(collection(db, "photos"), {
                    url: url,
                    name: file.name,
                    createdAt: Date.now()
                });
            }

            renderGallery();
            switchPage('upload-page', 'gallery-page');
            status.innerText = "";
        }

        // --- RENDER GALLERY ---
        async function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = "Memuat foto...";
            
            const q = query(collection(db, "photos"));
            const querySnapshot = await getDocs(q);
            
            grid.innerHTML = "";
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const card = document.createElement('div');
                card.className = 'img-card';
                card.innerHTML = `<img src="${data.url}">`;
                card.onclick = () => openPreview(data.url, docSnap.id, data.name);
                grid.appendChild(card);
            });
        }

        // --- PREVIEW, DOWNLOAD, DELETE ---
        window.openPreview = function(url, docId, fileName) {
            const overlay = document.getElementById('preview-overlay');
            document.getElementById('preview-img').src = url;
            
            // Setup Download
            const dl = document.getElementById('download-link');
            dl.href = url;
            dl.setAttribute('target', '_blank'); // Untuk download di web

            // Setup Delete
            const delBtn = document.getElementById('delete-btn');
            delBtn.onclick = async () => {
                if(confirm("Yakin mau hapus kenangan ini?")) {
                    await deleteDoc(doc(db, "photos", docId));
                    const storageRef = ref(storage, 'memori/' + fileName);
                    await deleteObject(storageRef);
                    closePreview();
                    renderGallery();
                }
            };

            overlay.classList.remove('hidden');
        }

        window.closePreview = () => document.getElementById('preview-overlay').classList.add('hidden');
        window.backToUpload = () => switchPage('gallery-page', 'upload-page');
        
        function switchPage(from, to) {
            document.getElementById(from).classList.add('hidden');
            document.getElementById(to).classList.remove('hidden');
        }
    </script>
</body>
</html>
